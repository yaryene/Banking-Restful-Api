services:
  mysql-db:
    image: mysql:8.0
    container_name: spring_boot_mysql
    environment:
      MYSQL_DATABASE: banking_app
      # Only need this to set the root user's password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: